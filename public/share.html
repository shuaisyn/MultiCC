<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>MultiCC · 分享会话</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  :root{--bg:#0d1117;--panel:#161b22;--border:#30363d;--text:#c9d1d9;--faint:#8b949e;--accent:#58a6ff;--green:#238636;--mono:ui-monospace,SFMono-Regular,Menlo,monospace}
  body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;height:100dvh;display:flex;flex-direction:column}
  header{display:flex;align-items:center;gap:10px;padding:10px 14px;border-bottom:1px solid var(--border);background:var(--panel);flex:none}
  header .logo{font-weight:700;color:#f78166}.logo span{color:#79c0ff}
  header .meta{font-size:13px;color:var(--faint);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  header .badge{margin-left:auto;font-size:11px;padding:2px 8px;border-radius:10px;border:1px solid var(--border);color:var(--faint);flex:none}
  #log{flex:1;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:12px}
  .msg{max-width:860px;width:100%;margin:0 auto;display:flex;gap:10px}
  .msg .who{font-size:11px;color:var(--faint);flex:none;width:46px;text-align:right;padding-top:3px}
  .msg .body{flex:1;background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:10px 12px;font-size:14px;line-height:1.6;white-space:pre-wrap;word-break:break-word;overflow-x:auto}
  .msg.user .body{background:#1b2330;border-color:#2d3a4f}
  .tool{font-family:var(--mono);font-size:12px;color:var(--faint);border-left:2px solid var(--border);padding:3px 8px;margin:6px 0;white-space:pre-wrap}
  .tool b{color:var(--accent);font-weight:600}
  #status{max-width:860px;width:100%;margin:0 auto;font-size:12px;color:var(--faint);min-height:16px}
  footer{flex:none;border-top:1px solid var(--border);background:var(--panel);padding:10px}
  .inrow{max-width:860px;margin:0 auto;display:flex;gap:8px}
  textarea{flex:1;resize:none;background:var(--bg);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:14px;padding:9px 11px;outline:none;font-family:inherit;max-height:120px}
  textarea:focus{border-color:var(--accent)}
  button{background:var(--green);border:none;border-radius:8px;color:#fff;font-size:14px;font-weight:600;padding:0 16px;cursor:pointer}
  button:disabled{opacity:.5;cursor:default}
  .center{margin:auto;text-align:center;max-width:340px;padding:24px}
  .center h1{font-size:18px;margin-bottom:8px;color:#f0f6fc}
  .center p{color:var(--faint);font-size:13px;margin-bottom:16px;line-height:1.6}
  .center input{width:100%;padding:10px 12px;border-radius:8px;border:1px solid var(--border);background:var(--bg);color:var(--text);font-size:14px;margin-bottom:12px;outline:none}
  .center .err{color:#f85149;font-size:13px;margin-bottom:10px;min-height:16px}
  .center button{width:100%;padding:10px}
</style>
</head>
<body>
  <div id="gate" class="center" style="display:none">
    <div class="logo" style="font-size:22px;margin-bottom:14px">Web<span>CC</span> · 分享</div>
    <h1>需要访问密码</h1>
    <p>分享方为此会话设置了密码，请输入后查看。</p>
    <div class="err" id="gate-err"></div>
    <input id="gate-pw" type="password" placeholder="访问密码" autocomplete="current-password">
    <button id="gate-go">进入</button>
  </div>

  <div id="dead" class="center" style="display:none">
    <h1>链接无效</h1>
    <p id="dead-msg">该分享链接不存在或已过期。</p>
  </div>

  <header id="app-header" style="display:none">
    <span class="logo">Web<span>CC</span></span>
    <span class="meta" id="hdr-label">—</span>
    <span class="badge" id="hdr-badge">只读</span>
  </header>
  <div id="log" style="display:none"></div>
  <div id="status-wrap" style="padding:0 14px;display:none"><div id="status"></div></div>
  <footer id="composer" style="display:none">
    <div class="inrow">
      <textarea id="input" rows="1" placeholder="输入消息…（Enter 发送，Shift+Enter 换行）"></textarea>
      <button id="send">发送</button>
    </div>
  </footer>

<script>
const TOKEN = decodeURIComponent(location.pathname.replace(/^\/share\//, '').replace(/\/$/, ''));
const $ = (id) => document.getElementById(id);
const esc = (s) => String(s == null ? '' : s).replace(/[&<>]/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[c]));
let ACCESS = 'view', SESSION = null, ws = null, liveEl = null, liveText = '';

function show(view) {
  for (const id of ['gate', 'dead', 'app-header', 'log', 'status-wrap', 'composer']) $(id).style.display = 'none';
  if (view === 'gate') $('gate').style.display = 'flex';
  else if (view === 'dead') $('dead').style.display = 'flex';
  else if (view === 'app') {
    $('app-header').style.display = 'flex'; $('log').style.display = 'flex'; $('status-wrap').style.display = 'block';
    if (ACCESS === 'operate') $('composer').style.display = 'block';
  }
}

async function loadSession() {
  let r;
  try { r = await fetch(`/api/share/${TOKEN}/session`); } catch { return show('dead'); }
  if (r.status === 401) return show('gate');
  if (!r.ok) { const j = await r.json().catch(() => ({})); $('dead-msg').textContent = j.error || '该分享链接不存在或已过期。'; return show('dead'); }
  const data = await r.json();
  ACCESS = data.access; SESSION = data.sessionId;
  $('hdr-label').textContent = data.label || data.sessionId || '分享';
  renderHistory(data.messages || []);
  if (data.type === 'messages') {
    // Static snapshot of selected messages — no live session, no WS, no input.
    $('hdr-badge').textContent = '消息快照';
    show('app');
    $('composer').style.display = 'none';
    setStatus('这是分享的消息快照（只读）。');
    return;
  }
  $('hdr-badge').textContent = ACCESS === 'operate' ? '可对话' : '只读';
  show('app');
  connectWs();
}

function renderHistory(messages) {
  const log = $('log'); log.innerHTML = '';
  for (const m of messages) addMessage(m.role, m.content, m.tools);
  scrollDown();
}

function addMessage(role, content, tools) {
  const log = $('log');
  const wrap = document.createElement('div');
  wrap.className = 'msg ' + (role === 'user' ? 'user' : 'assistant');
  const who = document.createElement('div'); who.className = 'who'; who.textContent = role === 'user' ? '我' : 'AI';
  const body = document.createElement('div'); body.className = 'body';
  let html = esc(content || '');
  if (tools && tools.length) html += tools.map(t => `<div class="tool"><b>🔧 ${esc(t.name)}</b>${t.input && t.input.command ? ' ' + esc(String(t.input.command).slice(0, 200)) : t.input && t.input.file_path ? ' ' + esc(t.input.file_path) : ''}</div>`).join('');
  body.innerHTML = html || '<span style="color:var(--faint)">…</span>';
  wrap.appendChild(who); wrap.appendChild(body);
  log.appendChild(wrap);
  return body;
}

function scrollDown() { const l = $('log'); l.scrollTop = l.scrollHeight; }

function connectWs() {
  const proto = location.protocol === 'https:' ? 'wss' : 'ws';
  ws = new WebSocket(`${proto}://${location.host}/ws/chat?session=${encodeURIComponent(SESSION)}&share=${encodeURIComponent(TOKEN)}`);
  ws.onmessage = (ev) => { let e; try { e = JSON.parse(ev.data); } catch { return; } onEvent(e); };
  ws.onclose = () => { setStatus('连接已断开，5 秒后重连…'); setTimeout(connectWs, 5000); };
  ws.onopen = () => setStatus('');
}

function ensureLive() {
  if (!liveEl) { liveEl = addMessage('assistant', '', null); liveText = ''; }
  return liveEl;
}

function onEvent(e) {
  if (e.type === 'assistant' && e.message && e.message.content) {
    for (const b of e.message.content) {
      if (b.type === 'text') { ensureLive(); liveText += b.text; liveEl.innerHTML = esc(liveText); scrollDown(); }
      else if (b.type === 'tool_use') { ensureLive(); liveEl.innerHTML = esc(liveText) + `<div class="tool"><b>🔧 ${esc(b.name)}</b>${b.input && b.input.command ? ' ' + esc(String(b.input.command).slice(0, 200)) : b.input && b.input.file_path ? ' ' + esc(b.input.file_path) : ''}</div>`; scrollDown(); }
    }
  } else if (e.type === 'stream_end' || e.type === 'result') {
    liveEl = null; liveText = '';
    setStatus('');
    // Reconcile with authoritative history (captures the user prompt + final text).
    fetch(`/api/share/${TOKEN}/session`).then(r => r.ok ? r.json() : null).then(d => { if (d && d.messages) renderHistory(d.messages); }).catch(() => {});
  } else if (e.type === 'notify') {
    setStatus(e.state === 'waiting' ? '⏳ ' + (e.message || '等待操作') : '');
  } else if (e.type === 'system' && e.subtype === 'init') {
    setStatus('AI 正在处理…');
  }
}

let _statusTimer = null;
function setStatus(t) { $('status').textContent = t || ''; }

// ── Password gate ──
async function submitPassword() {
  const pw = $('gate-pw').value;
  $('gate-err').textContent = '';
  let r;
  try { r = await fetch(`/api/share/${TOKEN}/auth`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ password: pw }) }); } catch { $('gate-err').textContent = '网络错误'; return; }
  if (!r.ok) { const j = await r.json().catch(() => ({})); $('gate-err').textContent = j.error || '密码错误'; return; }
  loadSession();
}
$('gate-go').onclick = submitPassword;
$('gate-pw').addEventListener('keydown', e => { if (e.key === 'Enter') submitPassword(); });

// ── Operate: send ──
const input = $('input');
input?.addEventListener('input', () => { input.style.height = 'auto'; input.style.height = Math.min(120, input.scrollHeight) + 'px'; });
input?.addEventListener('keydown', e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMsg(); } });
$('send') && ($('send').onclick = sendMsg);
function sendMsg() {
  const text = input.value.trim();
  if (!text || !ws || ws.readyState !== 1) return;
  addMessage('user', text, null); scrollDown();
  ws.send(JSON.stringify({ type: 'user_message', text }));
  input.value = ''; input.style.height = 'auto';
  setStatus('AI 正在处理…');
}

if (!TOKEN) show('dead'); else loadSession();
</script>
</body>
</html>
