<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#0d1117" />
  <title>MultiCC Chat</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/styles/github-dark.min.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow: hidden; }

    body {
      background: #0d1117;
      color: #c9d1d9;
      font-family: -apple-system, 'Segoe UI', system-ui, sans-serif;
      display: flex;
      flex-direction: column;
    }

    /* ── Header ── */
    #header {
      flex-shrink: 0;
      background: #161b22;
      border-bottom: 1px solid #30363d;
      padding: 8px 12px;
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      position: relative;
    }
    .logo { font-size: 15px; font-weight: 700; color: #f78166; white-space: nowrap; }
    .logo span { color: #79c0ff; }
    .badge {
      font-size: 10px; background: #238636; color: #fff;
      padding: 2px 8px; border-radius: 10px; font-weight: 600;
    }
    #status {
      font-size: 12px; color: #8b949e; white-space: nowrap;
    }
    #status.connected { color: #3fb950; }
    #status.error { color: #f85149; cursor: pointer; }
    .hdr-spacer { flex: 1; }
    .hdr-btn {
      padding: 4px 8px;
      background: #21262d;
      color: #c9d1d9;
      border: 1px solid #30363d;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
      white-space: nowrap;
      transition: background 0.15s;
    }
    .hdr-btn:hover { background: #30363d; }
    .hdr-btn:active { background: #388bfd; }
    .hdr-btn.merge-ready {
      background: #d29922;
      border-color: #e3b341;
      color: #0d1117;
      font-weight: 700;
      box-shadow: 0 0 0 2px #d2992230;
    }
    #header-more-wrap { position: relative; display: none; }
    #header-more-menu {
      display: none;
      position: absolute;
      right: 0;
      top: calc(100% + 6px);
      z-index: 50;
      min-width: 190px;
      padding: 6px;
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 8px;
      box-shadow: 0 12px 30px rgba(0,0,0,.35);
    }
    #header-more-menu.open { display: flex; flex-direction: column; gap: 6px; }
    #header-more-menu .hdr-btn { width: 100%; text-align: left; }
    @media (max-width: 760px) {
      #header { gap: 6px; }
      #header-more-wrap { display: inline-flex; }
      #session-title { max-width: 34vw; }
      #model-btn, #provider-btn, #role-btn, #memory-btn, #stream-btn, #share-btn { max-width: 100%; }
    }

    /* Session identity (directory / alias) shown in the header */
    #session-title {
      font-family: 'Cascadia Code', 'Fira Code', monospace;
      font-size: 13px;
      font-weight: 600;
      color: #6aa3ff;
      margin-left: 2px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      max-width: 38vw;
    }

    /* ── CWD bar ── */
    #cwd-bar {
      flex-shrink: 0;
      background: #0d1117;
      border-bottom: 1px solid #21262d;
      padding: 6px 12px;
      display: flex;
      align-items: center;
      gap: 8px;
      min-height: 30px;
    }
    #cwd-icon { font-size: 13px; color: #6e7681; flex-shrink: 0; }
    #cwd-path {
      font-family: 'Cascadia Code', 'Fira Code', monospace;
      font-size: 12px;
      color: #58a6ff;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      flex: 1;
      min-width: 0;
    }
    #cwd-change {
      font-size: 11px;
      color: #8b949e;
      cursor: pointer;
      white-space: nowrap;
      flex-shrink: 0;
      padding: 2px 6px;
      border: 1px solid #30363d;
      border-radius: 4px;
      background: transparent;
      transition: color 0.15s, border-color 0.15s;
    }
    #cwd-change:hover { color: #58a6ff; border-color: #58a6ff; }

    /* ── Messages ── */
    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      -webkit-overflow-scrolling: touch;
    }
    #messages::-webkit-scrollbar { width: 6px; }
    #messages::-webkit-scrollbar-thumb { background: #30363d; border-radius: 3px; }

    .msg {
      max-width: 92%;
      padding: 10px 14px;
      border-radius: 12px;
      font-size: 14px;
      line-height: 1.6;
      word-wrap: break-word;
      overflow-wrap: break-word;
    }
    .msg.user {
      align-self: flex-end;
      background: #1f6feb;
      color: #fff;
      border-bottom-right-radius: 4px;
    }
    .msg.assistant {
      align-self: flex-start;
      background: #161b22;
      border: 1px solid #30363d;
      border-bottom-left-radius: 4px;
    }
    .msg.system-msg {
      align-self: center;
      background: transparent;
      color: #6e7681;
      font-size: 12px;
      padding: 4px;
    }
    .msg.system-msg.disconnect-banner {
      background: rgba(248, 81, 73, 0.12);
      color: #f85149;
      border: 1px solid rgba(248, 81, 73, 0.35);
      border-radius: 6px;
      padding: 6px 10px;
      cursor: pointer;
      font-weight: 500;
    }
    .msg.system-msg.disconnect-banner:hover {
      background: rgba(248, 81, 73, 0.2);
    }

    /* Markdown content */
    .msg.assistant p { margin: 6px 0; }
    .msg.assistant p:first-child { margin-top: 0; }
    .msg.assistant p:last-child { margin-bottom: 0; }
    .msg.assistant ul, .msg.assistant ol { margin: 6px 0; padding-left: 20px; }
    .msg.assistant li { margin: 2px 0; }
    .msg.assistant strong { color: #f0f6fc; }
    .msg.assistant em { color: #d2a8ff; }
    .msg.assistant a { color: #58a6ff; }
    .msg.assistant h1, .msg.assistant h2, .msg.assistant h3 {
      color: #f0f6fc; margin: 10px 0 6px; font-size: 15px;
    }
    .msg.assistant h1 { font-size: 17px; }
    .msg.assistant blockquote {
      border-left: 3px solid #30363d; padding-left: 10px; color: #8b949e; margin: 6px 0;
    }
    .msg.assistant table {
      border-collapse: collapse; margin: 8px 0; font-size: 13px; width: 100%;
    }
    .msg.assistant th, .msg.assistant td {
      border: 1px solid #30363d; padding: 4px 8px; text-align: left;
    }
    .msg.assistant th { background: #21262d; color: #f0f6fc; }
    .msg.assistant code:not([class]) {
      background: #21262d; padding: 2px 5px; border-radius: 4px; font-size: 13px;
      font-family: 'Cascadia Code', 'Fira Code', monospace;
    }
    .msg.assistant pre {
      background: #0d1117; border: 1px solid #21262d; border-radius: 8px;
      padding: 12px; margin: 8px 0; overflow-x: auto; font-size: 13px; line-height: 1.5;
    }
    .msg.assistant pre code {
      background: none !important; padding: 0 !important;
      font-family: 'Cascadia Code', 'Fira Code', monospace;
    }

    /* ── Tool call cards ── */
    .tool-card {
      margin: 8px 0; border: 1px solid #30363d; border-radius: 8px;
      overflow: hidden; font-size: 13px;
    }
    .tool-header {
      display: flex; align-items: center; gap: 8px; padding: 8px 12px;
      background: #21262d; cursor: pointer; user-select: none;
    }
    .tool-header:hover { background: #30363d; }
    .tool-icon { font-size: 14px; }
    .tool-name { font-weight: 600; color: #79c0ff; }
    .tool-desc { color: #8b949e; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .tool-arrow { color: #6e7681; transition: transform 0.2s; font-size: 12px; }
    .tool-card.open .tool-arrow { transform: rotate(90deg); }
    .tool-body {
      display: none; padding: 10px 12px; background: #0d1117; border-top: 1px solid #21262d;
    }
    .tool-card.open .tool-body { display: block; }
    .tool-body pre {
      margin: 0; white-space: pre-wrap; word-break: break-all;
      font-family: 'Cascadia Code', monospace; font-size: 12px; color: #8b949e;
      max-height: 300px; overflow-y: auto;
    }
    .tool-result-label { font-size: 11px; color: #3fb950; margin-top: 8px; margin-bottom: 4px; font-weight: 600; }
    .tool-result-label.error { color: #f85149; }

    /* ── Thinking indicator ── */
    .thinking-bubble {
      align-self: flex-start;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 16px;
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 12px;
      border-bottom-left-radius: 4px;
      font-size: 13px;
      color: #8b949e;
    }
    .thinking-dots {
      display: flex; gap: 4px;
    }
    .thinking-dots span {
      width: 6px; height: 6px; background: #58a6ff; border-radius: 50%;
      animation: bounce 1.4s infinite ease-in-out both;
    }
    .thinking-dots span:nth-child(1) { animation-delay: -0.32s; }
    .thinking-dots span:nth-child(2) { animation-delay: -0.16s; }
    @keyframes bounce {
      0%,80%,100% { transform: scale(0); opacity: 0.3; }
      40% { transform: scale(1); opacity: 1; }
    }

    /* ── Streaming indicator ── */
    .streaming-dot::after {
      content: ''; display: inline-block; width: 6px; height: 6px;
      background: #58a6ff; border-radius: 50%; margin-left: 4px;
      animation: blink 1s infinite; vertical-align: middle;
    }
    @keyframes blink { 0%,100% { opacity: 1; } 50% { opacity: 0.2; } }

    /* ── Cancel button ── */
    #cancel-btn {
      display: none;
      flex-shrink: 0;
      width: 40px; height: 40px;
      background: #f85149;
      border: none;
      border-radius: 10px;
      color: #fff;
      font-size: 18px;
      cursor: pointer;
      align-items: center;
      justify-content: center;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }
    #cancel-btn.show { display: flex; }

    /* ── Attachments ── */
    #attach-area {
      display: none; /* shown when has children */
      flex-shrink: 0;
      background: #161b22;
      padding: 6px 12px;
      border-top: 1px solid #21262d;
      gap: 6px;
      flex-wrap: wrap;
    }
    #attach-area.has-items { display: flex; }
    .attach-chip {
      display: flex; align-items: center; gap: 4px;
      background: #21262d; border: 1px solid #30363d; border-radius: 6px;
      padding: 3px 6px; font-size: 11px; color: #8b949e; max-width: 200px;
      cursor: default;
    }
    .attach-chip.is-image { cursor: pointer; }
    .attach-chip.is-image:hover { border-color: #58a6ff; }
    .attach-chip .chip-thumb {
      width: 24px; height: 24px; object-fit: cover; border-radius: 3px; flex-shrink: 0;
    }
    .attach-chip .chip-name {
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1; min-width: 0;
    }
    .attach-chip .chip-remove {
      cursor: pointer; color: #6e7681; font-size: 14px; line-height: 1; flex-shrink: 0;
    }
    .attach-chip .chip-remove:hover { color: #f85149; }

    /* ── Image preview lightbox ── */
    #img-lightbox {
      display: none; position: fixed; inset: 0; z-index: 9999;
      background: rgba(0,0,0,.85); align-items: center; justify-content: center;
    }
    #img-lightbox.show { display: flex; }
    #img-lightbox img {
      max-width: 92vw; max-height: 88vh; border-radius: 8px;
      box-shadow: 0 4px 24px rgba(0,0,0,.6);
    }
    #img-lightbox .lb-close {
      position: absolute; top: 16px; right: 20px;
      font-size: 32px; color: #ccc; cursor: pointer; line-height: 1;
    }
    #img-lightbox .lb-close:hover { color: #fff; }
    #img-lightbox .lb-name {
      position: absolute; bottom: 16px; left: 50%; transform: translateX(-50%);
      color: #8b949e; font-size: 13px; max-width: 80vw;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }

    /* ── Input bar ── */
    #input-bar {
      flex-shrink: 0;
      background: #161b22;
      border-top: 1px solid #30363d;
      padding: 8px 10px;
      padding-bottom: calc(8px + env(safe-area-inset-bottom));
      display: flex;
      gap: 6px;
      align-items: flex-end;
    }
    .input-action-btn {
      flex-shrink: 0;
      width: 40px; height: 40px;
      background: #21262d;
      border: 1px solid #30363d;
      border-radius: 10px;
      color: #c9d1d9;
      font-size: 16px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }
    .input-action-btn:hover { background: #30363d; }
    .input-action-btn:active { background: #388bfd; }
    .input-action-btn:disabled { opacity: 0.4; cursor: default; }
    .input-action-btn.recording {
      background: #f85149; border-color: #f85149; color: #fff;
      animation: blink 1s infinite;
    }
    .input-action-btn.processing {
      background: #d29922; border-color: #d29922; color: #fff;
      animation: blink 1s infinite;
    }

    #input-bar textarea {
      flex: 1;
      background: #0d1117;
      border: 1px solid #30363d;
      border-radius: 10px;
      color: #c9d1d9;
      font-size: 14px;
      padding: 10px 12px;
      outline: none;
      resize: none;
      min-height: 40px;
      max-height: 120px;
      line-height: 1.4;
      font-family: inherit;
    }
    #input-bar textarea:focus { border-color: #388bfd; }
    #input-bar textarea::placeholder { color: #484f58; }

    #merge-hint {
      display: none;
      position: fixed;
      left: 12px;
      right: 12px;
      bottom: calc(62px + env(safe-area-inset-bottom));
      z-index: 8500;
      align-items: center;
      gap: 10px;
      padding: 9px 10px;
      background: #2d2108;
      border: 1px solid #d29922;
      border-radius: 8px;
      box-shadow: 0 10px 28px #00000066;
      color: #f2cc60;
      font-size: 12px;
      line-height: 1.35;
    }
    #merge-hint.show { display: flex; }
    #merge-hint .merge-hint-text { flex: 1; min-width: 0; }
    /* Worktree branch / behind-base indicator */
    #worktree-bar {
      display: none;
      align-items: center;
      gap: 8px;
      padding: 4px 12px;
      font-family: monospace;
      font-size: 11px;
      color: #8a909b;
      background: #0a0c0f;
      border-bottom: 1px solid #14171c;
    }
    #worktree-bar.show { display: flex; }
    #worktree-bar .worktree-label { flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    #worktree-bar.behind {
      color: #f2cc60;
      background: #2d2108;
      border-bottom-color: #e3b341;
    }
    #worktree-sync-btn {
      flex: none;
      padding: 2px 12px;
      font-size: 11px;
      font-weight: 700;
      color: #070809;
      background: #e3b341;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }
    #worktree-sync-btn:hover { background: #f2cc60; }
    #worktree-sync-btn:disabled { opacity: 0.6; cursor: default; }
    #merge-hint button {
      flex-shrink: 0;
      border: 1px solid #e3b341;
      background: #d29922;
      color: #0d1117;
      border-radius: 6px;
      padding: 5px 10px;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
    }
    #merge-hint button.ghost {
      background: transparent;
      border-color: #e3b341;
      color: #f2cc60;
    }
    #merge-hint button.ghost:hover { background: #3a2c0a; }

    #send-btn {
      flex-shrink: 0;
      width: 40px; height: 40px;
      background: #238636;
      border: none;
      border-radius: 10px;
      color: #fff;
      font-size: 18px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }
    #send-btn:hover { background: #2ea043; }
    #send-btn:disabled { background: #21262d; color: #484f58; cursor: default; }

    /* ── Mic status toast ── */
    #mic-toast {
      display: none;
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 12px;
      padding: 16px 24px;
      font-size: 14px;
      color: #c9d1d9;
      z-index: 9000;
      box-shadow: 0 8px 32px #00000066;
      text-align: center;
    }
    #mic-toast.show { display: block; }

    /* ── Notification Toast ── */
    #notify-toast {
      display: none;
      position: fixed;
      top: 8px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 9000;
      background: #1f6feb;
      color: #fff;
      font-size: 13px;
      font-weight: 600;
      padding: 8px 36px 8px 14px;
      border-radius: 8px;
      box-shadow: 0 4px 16px #00000066;
      cursor: pointer;
      animation: toastSlide 0.3s ease;
      white-space: nowrap;
      max-width: 90%;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    #notify-toast.waiting { background: #d29922; }
    #notify-toast.completed { background: #238636; }
    #notify-toast .toast-close {
      position: absolute;
      right: 10px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 16px;
      opacity: 0.7;
      transition: opacity 0.15s;
    }
    #notify-toast .toast-close:hover { opacity: 1; }
    @keyframes toastSlide {
      from { opacity: 0; transform: translateX(-50%) translateY(-20px); }
      to   { opacity: 1; transform: translateX(-50%) translateY(0); }
    }

    /* ── Voice panel ── */
    #voice-panel {
      display: none;
      position: fixed;
      inset: 0;
      background: #00000088;
      z-index: 20000;
      align-items: center;
      justify-content: center;
    }
    #voice-panel.open { display: flex; }
    #voice-panel-inner {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 12px;
      padding: 16px;
      width: 500px;
      max-width: 94vw;
      box-shadow: 0 16px 48px #00000099;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .vp-label { font-size: 11px; color: #8b949e; }
    #voice-panel textarea {
      width: 100%;
      background: #0d1117;
      border: 1px solid #30363d;
      border-radius: 6px;
      color: #c9d1d9;
      font-size: 13px;
      font-family: inherit;
      padding: 8px 10px;
      resize: vertical;
      outline: none;
      min-height: 60px;
    }
    #voice-panel textarea:focus { border-color: #388bfd; }
    .vp-actions {
      display: flex; gap: 8px; justify-content: flex-end; flex-wrap: wrap;
    }
    .vp-actions button {
      padding: 7px 14px; border-radius: 6px; border: 1px solid #30363d;
      background: #21262d; color: #c9d1d9; font-size: 13px; cursor: pointer;
    }
    .vp-actions button:hover { background: #30363d; }
    .vp-actions button.primary {
      background: #238636; border-color: #2ea043; color: #fff; font-weight: 600;
    }
    .vp-actions button.primary:hover { background: #2ea043; }

    /* ── Cost bar ── */
    #cost-bar {
      font-size: 11px; color: #6e7681; text-align: center;
      padding: 3px; background: #0d1117; min-height: 18px;
    }

    /* ── CWD change modal ── */
    #cwd-modal {
      display: none; position: fixed; inset: 0; background: #000000cc;
      z-index: 15000; align-items: center; justify-content: center;
    }
    #cwd-modal.open { display: flex; }
    #cwd-modal-inner {
      background: #161b22; border: 1px solid #30363d; border-radius: 12px;
      padding: 20px; width: 480px; max-width: 94vw;
      box-shadow: 0 16px 48px #00000099;
    }
    #cwd-modal-inner h3 { font-size: 15px; color: #f0f6fc; margin-bottom: 12px; }
    #cwd-modal-inner input {
      width: 100%; background: #0d1117; border: 1px solid #30363d;
      border-radius: 6px; color: #c9d1d9; font-size: 13px;
      font-family: monospace; padding: 8px 12px; outline: none;
      margin-bottom: 12px;
    }
    #cwd-modal-inner input:focus { border-color: #388bfd; }
    .modal-actions { display: flex; gap: 8px; justify-content: flex-end; }
    .modal-actions button {
      padding: 7px 14px; border-radius: 6px; border: 1px solid #30363d;
      background: #21262d; color: #c9d1d9; font-size: 13px; cursor: pointer;
    }
    .modal-actions button:hover { background: #30363d; }
    .modal-actions button.primary {
      background: #238636; border-color: #2ea043; color: #fff; font-weight: 600;
    }
    .modal-actions button:disabled { opacity: 0.5; cursor: default; }

    /* ── Goal mode modal ── */
    #goal-modal {
      display: none; position: fixed; inset: 0; background: #000000cc;
      z-index: 15000; align-items: center; justify-content: center;
    }
    #goal-modal.open { display: flex; }
    #goal-modal-inner {
      background: #161b22; border: 1px solid #30363d; border-radius: 12px;
      padding: 20px; width: 560px; max-width: 94vw; max-height: 88vh; overflow: auto;
      box-shadow: 0 16px 48px #00000099;
    }
    #goal-modal-inner h3 { font-size: 15px; color: #f0f6fc; margin-bottom: 8px; }
    .goal-hint { font-size: 12px; color: #8b949e; margin-bottom: 12px; line-height: 1.5; }
    .goal-label { display: block; font-size: 12px; color: #8b949e; margin: 10px 0 6px; }
    #goal-modal-inner textarea {
      width: 100%; background: #0d1117; border: 1px solid #30363d;
      border-radius: 6px; color: #c9d1d9; font-size: 13px; line-height: 1.6;
      padding: 10px 12px; outline: none; resize: vertical; min-height: 80px;
      font-family: inherit;
    }
    #goal-modal-inner textarea:focus { border-color: #388bfd; }
    #goal-verdict { font-size: 13px; font-weight: 600; padding: 8px 12px; border-radius: 6px; margin-bottom: 8px; }
    #goal-verdict.ok { background: #12261a; color: #3fb950; border: 1px solid #2ea04355; }
    #goal-verdict.warn { background: #2b2410; color: #d29922; border: 1px solid #bb800955; }
    .goal-sec-title { font-size: 11px; color: #8b949e; margin: 10px 0 2px; text-transform: uppercase; letter-spacing: .04em; }
    .goal-list { font-size: 12px; color: #c9d1d9; margin: 0; padding-left: 18px; }
    .goal-list li { margin: 3px 0; line-height: 1.5; }
    .goal-err { font-size: 12px; color: #f85149; margin-top: 8px; }
    .goal-dims { display: flex; flex-wrap: wrap; gap: 8px 16px; }
    .goal-dims label { display: flex; align-items: center; gap: 5px; font-size: 12px; color: #c9d1d9; cursor: pointer; }
    .goal-dims input { margin: 0; }
    .goal-limits { display: flex; flex-wrap: wrap; gap: 8px 16px; }
    .goal-limits label { display: flex; align-items: center; gap: 6px; font-size: 12px; color: #c9d1d9; }
    .goal-limits input { width: 90px; background: #0d1117; border: 1px solid #30363d; border-radius: 6px; color: #c9d1d9; padding: 4px 6px; font-size: 12px; }
    .goal-limits input:focus { border-color: #388bfd; outline: none; }

    /* ── Diff modal ── */
    #diff-modal {
      display: none; position: fixed; inset: 0; background: #000000cc;
      z-index: 15000; align-items: center; justify-content: center;
    }
    #diff-modal.open { display: flex; }
    #diff-modal-inner {
      background: #0d1117; border: 1px solid #30363d; border-radius: 12px;
      width: min(96vw, 1100px); height: min(90vh, 800px);
      display: flex; flex-direction: column; overflow: hidden;
      box-shadow: 0 16px 48px #00000099;
    }
    #diff-modal-head {
      display: flex; align-items: center; gap: 12px;
      padding: 12px 16px; border-bottom: 1px solid #30363d;
    }
    #diff-title { color: #f0f6fc; font-size: 14px; font-weight: 600; }
    #diff-subtitle {
      color: #8b949e; font-size: 11px; font-family: monospace; margin-top: 2px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    #diff-stat {
      padding: 8px 16px; border-bottom: 1px solid #30363d;
      font-family: monospace; font-size: 11px; color: #8b949e;
      white-space: pre; overflow-x: auto; max-height: 140px; overflow-y: auto;
    }
    #diff-content {
      flex: 1; overflow: auto; padding: 8px 0;
      font-family: monospace; font-size: 12px; line-height: 1.45; color: #c9d1d9;
    }
    .diff-line { display: block; padding: 0 16px; white-space: pre; }
    .diff-add { background: rgba(46,160,67,.18); color: #7ee787; }
    .diff-del { background: rgba(248,81,73,.18); color: #ffa198; }
    .diff-hunk { color: #58a6ff; background: #161b22; }
    .diff-head { color: #cdb4ff; }
    .diff-meta { color: #6e7681; }
    .diff-conflict { color: #f2cc60; background: rgba(227,179,65,.18); font-weight: 600; }

    /* ── Debug panel ── */
    #debug-panel {
      position: fixed; top: 0; right: 0; bottom: 0;
      width: 380px; max-width: 90vw;
      background: #0d1117; border-left: 1px solid #30363d;
      z-index: 18000; display: flex; flex-direction: column;
      transform: translateX(105%); transition: transform 0.2s ease;
      box-shadow: -8px 0 28px #00000088;
    }
    #debug-panel.open { transform: translateX(0); }
    #debug-panel .dbg-head {
      flex-shrink: 0; padding: 8px 10px; background: #161b22;
      border-bottom: 1px solid #30363d; display: flex; align-items: center; gap: 6px;
    }
    #debug-panel .dbg-title { font-size: 13px; font-weight: 700; color: #f0f6fc; flex: 1; }
    #debug-panel .dbg-head button {
      background: #21262d; border: 1px solid #30363d; border-radius: 5px;
      color: #c9d1d9; font-size: 11px; padding: 3px 8px; cursor: pointer;
    }
    #debug-panel .dbg-head button:hover { background: #30363d; }
    #dbg-state {
      flex-shrink: 0; padding: 7px 10px; background: #161b22;
      border-bottom: 1px solid #21262d; display: flex; flex-wrap: wrap; gap: 4px;
    }
    .dbg-badge {
      font-size: 10px; font-family: 'Cascadia Code', monospace; padding: 2px 6px;
      border-radius: 4px; background: #21262d; color: #8b949e; border: 1px solid #30363d;
    }
    .dbg-badge b { color: #c9d1d9; font-weight: 600; }
    .dbg-badge.warn { background: rgba(210,153,34,.15); border-color: #d29922; color: #d29922; }
    .dbg-badge.ok   { background: rgba(63,185,80,.12); border-color: #3fb950; color: #3fb950; }
    .dbg-badge.bad  { background: rgba(248,81,73,.14); border-color: #f85149; color: #f85149; }
    #dbg-log {
      flex: 1; overflow-y: auto; padding: 6px 8px;
      font-family: 'Cascadia Code', monospace; font-size: 11px; line-height: 1.55;
    }
    #dbg-log .dbg-line { white-space: pre-wrap; word-break: break-all; padding: 1px 0; }
    #dbg-log .dbg-time { color: #6e7681; }
    .dbg-cat-event { color: #79c0ff; }
    .dbg-cat-state { color: #d2a8ff; }
    .dbg-cat-think { color: #d29922; }
    .dbg-cat-ws    { color: #3fb950; }
    .dbg-cat-warn  { color: #f85149; }
    #dbg-log::-webkit-scrollbar { width: 6px; }
    #dbg-log::-webkit-scrollbar-thumb { background: #30363d; border-radius: 3px; }
  </style>
</head>
<body>

  <!-- Image preview lightbox -->
  <div id="img-lightbox">
    <span class="lb-close">&times;</span>
    <img src="" alt="preview" />
    <span class="lb-name"></span>
  </div>

  <!-- Header -->
  <div id="header">
    <span class="logo">Multi<span>CC</span></span>
    <span class="badge">Chat</span>
    <span id="status">Connecting...</span>
    <span id="session-title" title="会话身份：目录 / 别名"></span>
    <button id="reconnect-btn" class="hdr-btn" title="强制重连（连接卡住时点这里；长按可刷新页面）">&#8635;</button>
    <span class="hdr-spacer"></span>
    <button class="hdr-btn lang-toggle" onclick="toggleLang()" data-i18n-title="language" title="Language">中/EN</button>
    <button id="notify-btn" class="hdr-btn" title="语音通知 (点击开启/关闭)">&#128276;</button>
    <button id="dbg-btn" class="hdr-btn" title="Debug 面板">&#128027;</button>
    <a href="/" class="hdr-btn" title="Terminal mode" data-i18n="terminal">Terminal</a>
    <button class="hdr-btn" id="model-btn" title="切换该会话使用的模型（下一轮对话生效）" style="display:none"></button>
    <button class="hdr-btn" id="provider-btn" title="切换该会话使用的 Provider（下一轮对话生效）" style="display:none"></button>
    <button class="hdr-btn" id="role-btn" title="设置该会话的角色提示词（下一轮对话生效）" data-i18n="role">🎭 角色</button>
    <button class="hdr-btn" id="memory-btn" title="会话记忆：清理历史时辅助 AI 自动提炼的关键问题与解决方式，可查看/编辑" data-i18n="memory">🧠 记忆</button>
    <button class="hdr-btn" id="stream-btn" title="流式常驻 / 自动接力（claude 会话）" style="display:none" data-i18n="stream">⚡ 流式</button>
    <button class="hdr-btn" id="share-btn" title="把此会话分享到外部（网页链接：只读 / 密码 / 可对话）" data-i18n="share">🔗 分享</button>
    <span id="header-more-wrap">
      <button class="hdr-btn" id="header-more-btn" data-i18n="more">更多</button>
      <span id="header-more-menu"></span>
    </span>
    <button class="hdr-btn" id="merge-btn" data-i18n-title="mergeWorktreeTitle" title="把此会话 worktree 合并回基分支" data-i18n="merge">合并</button>
    <button class="hdr-btn" id="clear-ctx-btn" title="Clear context" data-i18n="clear">Clear</button>
    <button class="hdr-btn" id="memo-btn" title="项目备忘 (multicc.memo.md)" onclick="openMemo()">📝</button>
    <button id="manage-btn" class="hdr-btn" onclick="location.href='/manage'" data-i18n="manage">Manage</button>
  </div>

  <!-- CWD bar -->
  <div id="cwd-bar">
    <span id="cwd-icon">&#128193;</span>
    <span id="cwd-path">-</span>
    <button id="cwd-change" style="display:none" data-i18n="changeDir">Change</button>
  </div>

  <!-- Worktree branch + behind-base indicator (populated by applyBehindStatus) -->
  <div id="worktree-bar"></div>

  <!-- Messages -->
  <div id="messages">
    <div class="msg system-msg">Chat mode — structured output rendering</div>
  </div>

  <!-- Cost -->
  <div id="cost-bar"></div>

  <!-- Attachments area -->
  <div id="attach-area"></div>

  <div id="merge-hint">
    <span class="merge-hint-text">当前 worktree 有可合并内容。</span>
    <button id="merge-hint-diff-btn" class="ghost">查看 Diff</button>
    <button id="merge-hint-btn">合并</button>
  </div>

  <!-- Diff modal -->
  <div id="diff-modal">
    <div id="diff-modal-inner">
      <div id="diff-modal-head">
        <div style="flex:1;min-width:0;">
          <div id="diff-title">Diff</div>
          <div id="diff-subtitle"></div>
        </div>
        <button class="ghost" style="border:1px solid #30363d;background:#21262d;color:#c9d1d9;border-radius:6px;padding:6px 14px;font-size:13px;cursor:pointer;" onclick="closeDiffModal()">关闭</button>
      </div>
      <div id="diff-stat"></div>
      <div id="diff-content"></div>
    </div>
  </div>

  <!-- Input bar -->
  <div id="input-bar">
    <button id="mic-btn" class="input-action-btn" title="Voice input">&#127908;</button>
    <button id="attach-btn" class="input-action-btn" title="Attach file">&#128206;</button>
    <button id="goal-btn" class="input-action-btn" title="以 Goal 模式发送任务（先用 AI 预检目标与完成标准）">&#127919;</button>
    <input id="file-input" type="file" style="display:none" multiple />
    <textarea id="input" rows="1" placeholder="Type a message… or paste files here" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false"></textarea>
    <button id="send-btn" title="Send">&#10148;</button>
    <button id="cancel-btn" title="Stop">&#9724;</button>
  </div>

  <!-- Mic toast -->
  <div id="mic-toast"></div>

  <!-- Notify toast -->
  <div id="notify-toast"><span class="toast-close">&#10005;</span></div>

  <!-- Voice panel -->
  <div id="voice-panel">
    <div id="voice-panel-inner">
      <div style="font-size:14px;font-weight:600;color:#f0f6fc;">Voice Input</div>
      <div class="vp-label">Raw transcription</div>
      <textarea id="vp-raw"></textarea>
      <div class="vp-label">AI refined <span id="vp-status" style="color:#3fb950;font-size:10px;"></span></div>
      <textarea id="vp-refined" placeholder="Processing..."></textarea>
      <div class="vp-actions">
        <button id="vp-cancel">Cancel</button>
        <button id="vp-use-raw">Use raw</button>
        <button id="vp-use-refined" class="primary">Use refined</button>
      </div>
    </div>
  </div>

  <!-- CWD change modal -->
  <div id="cwd-modal">
    <div id="cwd-modal-inner">
      <h3>Change working directory</h3>
      <input id="cwd-input" type="text" placeholder="/path/to/project" autocomplete="off" />
      <div id="cwd-error" style="font-size:12px;color:#f85149;margin-bottom:8px;display:none;"></div>
      <div class="modal-actions">
        <button id="cwd-modal-cancel">Cancel</button>
        <button id="cwd-modal-confirm" class="primary">Apply</button>
      </div>
    </div>
  </div>

  <!-- Goal mode modal -->
  <div id="goal-modal">
    <div id="goal-modal-inner">
      <h3>&#127919; Goal 模式发送</h3>
      <div class="goal-hint">发送前先用辅助 AI 预检：目标是否明确、完成标准是否清晰、能否独立执行。不符合会给出改写建议，你确认或修改后再真正执行。</div>
      <label class="goal-label">任务</label>
      <textarea id="goal-task" placeholder="描述你要达成的目标…"></textarea>
      <label class="goal-label">检查维度（本次预检，默认取设置里的全局配置）</label>
      <div id="goal-dims" class="goal-dims">
        <label><input type="checkbox" data-dim="objective" /> 目标明确</label>
        <label><input type="checkbox" data-dim="criteria" /> 完成标准</label>
        <label><input type="checkbox" data-dim="scope" /> 范围清晰</label>
        <label><input type="checkbox" data-dim="executable" /> 可独立执行</label>
      </div>
      <label class="goal-label">执行限制（本次任务，默认取设置里的全局配置；0 = 不限制）</label>
      <div class="goal-limits">
        <label>轮次上限<input id="goal-max-rounds" type="number" min="0" max="200" placeholder="轮" /></label>
        <label>预算上限<input id="goal-max-budget" type="number" min="0" step="1000" placeholder="token" /></label>
      </div>
      <div id="goal-result" style="display:none">
        <div id="goal-verdict"></div>
        <div id="goal-detail"></div>
        <label class="goal-label">改写版（可编辑，将作为实际执行的任务）</label>
        <textarea id="goal-revised" placeholder="预检后这里给出可直接执行的版本"></textarea>
      </div>
      <div id="goal-error" class="goal-err" style="display:none"></div>
      <div class="modal-actions">
        <button id="goal-cancel">取消</button>
        <button id="goal-precheck" class="primary">预检</button>
        <button id="goal-send" style="display:none" class="primary">以 Goal 模式发送</button>
        <button id="goal-send-raw" style="display:none" title="跳过改写，用原任务直接以 Goal 模式执行">用原文发送</button>
      </div>
    </div>
  </div>

  <!-- Debug panel -->
  <div id="debug-panel">
    <div class="dbg-head">
      <span class="dbg-title">&#128027; Debug</span>
      <button id="dbg-copy">Copy</button>
      <button id="dbg-clear">Clear</button>
      <button id="dbg-close">&times;</button>
    </div>
    <div id="dbg-state"></div>
    <div id="dbg-log"></div>
  </div>

  <script src="i18n.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked@12.0.1/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/lib/core.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/lib/languages/javascript.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/lib/languages/python.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/lib/languages/bash.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/lib/languages/json.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/lib/languages/typescript.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/lib/languages/css.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/lib/languages/xml.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/lib/languages/java.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/lib/languages/go.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/lib/languages/rust.min.js"></script>
  <script src="chat.js"></script>
</body>
</html>
