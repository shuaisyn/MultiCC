<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0d1117" />
  <title>📝 Memo · MultiCC</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      background: #0d1117; color: #c9d1d9;
      font-family: -apple-system, 'Segoe UI', system-ui, sans-serif;
      display: flex; flex-direction: column; overflow: hidden;
    }
    #header {
      flex-shrink: 0; background: #161b22;
      border-bottom: 1px solid #21262d;
      padding: 10px 14px; display: flex; align-items: center; gap: 8px;
    }
    #title { flex: 1; min-width: 0; }
    #title-name { font-size: 14px; font-weight: 600; color: #f0f6fc; }
    #title-path {
      font-size: 11px; color: #8b949e; font-family: monospace;
      margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .btn {
      background: #21262d; border: 1px solid #30363d; color: #c9d1d9;
      border-radius: 6px; padding: 6px 10px; font-size: 12px; cursor: pointer;
      white-space: nowrap;
    }
    .btn:hover { background: #30363d; }
    .btn-primary { background: #238636; border-color: #2ea043; color: #fff; }
    .btn-primary:hover { background: #2ea043; }
    #memo-text {
      flex: 1; width: 100%; background: #0d1117; color: #c9d1d9;
      border: 0; outline: 0; padding: 12px 14px;
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      font-size: 13px; line-height: 1.6; resize: none; overflow: auto;
    }
    #status {
      flex-shrink: 0; padding: 6px 14px; font-size: 11px;
      color: #6e7681; font-family: monospace;
      border-top: 1px solid #21262d; background: #161b22;
      min-height: 28px;
    }

    #picker { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.6); z-index: 10000; align-items: center; justify-content: center; }
    #picker.open { display: flex; }
    .picker-card { background: #161b22; border: 1px solid #30363d; border-radius: 10px; padding: 14px 18px; width: min(90vw, 440px); }
    .picker-card h3 { font-size: 13px; color: #f0f6fc; margin-bottom: 6px; }
    .picker-preview { color: #8b949e; font-size: 11px; margin-bottom: 10px; font-family: monospace; word-break: break-word; background: #0d1117; border: 1px solid #21262d; border-radius: 6px; padding: 6px 8px; max-height: 90px; overflow: auto; }
    .picker-list { display: flex; flex-direction: column; gap: 6px; margin-bottom: 10px; max-height: 280px; overflow: auto; }
    .picker-list button { display: flex; justify-content: space-between; gap: 10px; text-align: left; }
    .picker-actions { text-align: right; }
  </style>
</head>
<body>
  <div id="header">
    <div id="title">
      <div id="title-name">📝 备忘</div>
      <div id="title-path">加载中…</div>
    </div>
    <button class="btn" id="send-btn" title="把光标所在行发到该Fleet的 chat 会话">→ 发送当前行</button>
    <button class="btn btn-primary" id="save-btn" title="保存 (Ctrl/Cmd+S)">保存</button>
    <button class="btn" onclick="window.close()">关闭</button>
  </div>
  <textarea id="memo-text" spellcheck="false" placeholder="在这里写备忘…&#10;例：&#10;# todo&#10;- [ ] 任务一&#10;- [ ] 任务二"></textarea>
  <div id="status"></div>

  <div id="picker">
    <div class="picker-card">
      <h3>发送到 chat 会话</h3>
      <div class="picker-preview" id="picker-preview"></div>
      <div class="picker-list" id="picker-list"></div>
      <div class="picker-actions"><button class="btn" id="picker-cancel">取消</button></div>
    </div>
  </div>

  <script>
    const $ = (id) => document.getElementById(id);
    const params = new URLSearchParams(location.search);
    const urlToken = params.get('token') || '';
    const tokenQS = (prefix) => urlToken ? `${prefix}token=${encodeURIComponent(urlToken)}` : '';
    let _dirId = params.get('dirId') || '';
    const _sessionId = params.get('sessionId') || '';

    function setStatus(msg) { $('status').textContent = msg; }
    function escapeHtml(s) {
      return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
    }

    async function bootstrap() {
      try {
        if (!_dirId && _sessionId) {
          const r = await fetch(`/api/sessions/${encodeURIComponent(_sessionId)}${tokenQS('?')}`);
          if (!r.ok) throw new Error(`session not found (${r.status})`);
          const s = await r.json();
          _dirId = s.dirId || (s.persisted && s.persisted.dirId) || '';
          if (!_dirId) {
            // Some session endpoints don't return dirId; fall back to scanning /api/sessions
            const all = await (await fetch(`/api/sessions${tokenQS('?')}`)).json();
            const found = (Array.isArray(all) ? all : []).find(x => x.id === _sessionId);
            if (found) _dirId = found.dirId || '';
          }
        }
        if (!_dirId) { setStatus('缺少 dirId / sessionId 参数，或会话没有Fleet归属'); return; }
        await loadMemo();
      } catch (e) { setStatus('初始化失败：' + e.message); }
    }

    async function loadMemo() {
      try {
        const r = await fetch(`/api/directories/${encodeURIComponent(_dirId)}/memo${tokenQS('?')}`);
        if (!r.ok) { setStatus('加载失败：HTTP ' + r.status); return; }
        const data = await r.json();
        $('memo-text').value = data.text || '';
        $('title-path').textContent = `${data.path || ''}${data.exists ? '' : ' · 文件尚未创建（保存即创建）'}`;
        try {
          const dirs = await (await fetch(`/api/directories${tokenQS('?')}`)).json();
          const d = (dirs || []).find(x => x.id === _dirId);
          if (d) {
            $('title-name').textContent = `📝 ${d.name} · 备忘`;
            document.title = `📝 ${d.name} · Memo · MultiCC`;
          }
        } catch (_) {}
        $('memo-text').focus();
      } catch (e) { setStatus('加载失败：' + e.message); }
    }

    async function saveMemo() {
      if (!_dirId) return;
      const text = $('memo-text').value;
      setStatus('保存中…');
      try {
        const r = await fetch(`/api/directories/${encodeURIComponent(_dirId)}/memo${tokenQS('?')}`, {
          method: 'PUT', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ text }),
        });
        if (!r.ok) { const e = await r.json().catch(() => ({})); setStatus('保存失败：' + (e.error || r.status)); return; }
        setStatus(`已保存 · ${new Date().toLocaleTimeString()}`);
      } catch (e) { setStatus('保存失败：' + e.message); }
    }

    function currentLineText() {
      const ta = $('memo-text');
      const v = ta.value;
      const pos = ta.selectionStart;
      const before = v.lastIndexOf('\n', Math.max(0, pos - 1));
      const after = v.indexOf('\n', pos);
      const start = before === -1 ? 0 : before + 1;
      const end = after === -1 ? v.length : after;
      let line = v.slice(start, end);
      line = line.replace(/^\s*[-*+]\s+\[[ xX]\]\s*/, '');
      line = line.replace(/^\s*[-*+]\s+/, '');
      line = line.replace(/^\s*\d+\.\s+/, '');
      line = line.replace(/^\s*#+\s+/, '');
      return line.trim();
    }

    async function openPicker() {
      if (!_dirId) return;
      const text = currentLineText();
      if (!text) { setStatus('当前行为空，无法发送'); return; }
      try {
        const all = await (await fetch(`/api/sessions${tokenQS('?')}`)).json();
        const sessions = (Array.isArray(all) ? all : [])
          .filter(s => s.dirId === _dirId && s.kind === 'chat' && s.type !== 'aux' && s.type !== 'gateway');
        if (!sessions.length) { setStatus('该Fleet还没有 chat 会话，请先新建一个'); return; }
        $('picker-preview').textContent = text.length > 200 ? text.slice(0, 200) + '…' : text;
        $('picker-list').innerHTML = sessions.map(s => {
          const label = s.label && s.label !== s.id
            ? `${escapeHtml(s.label)} <span style="color:#6e7681;">${escapeHtml(s.id)}</span>`
            : escapeHtml(s.id);
          return `<button class="btn" data-id="${escapeHtml(s.id)}"><span style="overflow:hidden;text-overflow:ellipsis;">${label}</span><span style="color:#6e7681;font-size:11px;flex-shrink:0;">${escapeHtml(s.kind || '')}</span></button>`;
        }).join('');
        for (const btn of $('picker-list').querySelectorAll('button')) {
          btn.onclick = () => confirmSend(btn.getAttribute('data-id'));
        }
        $('picker').classList.add('open');
      } catch (e) { setStatus('加载会话列表失败：' + e.message); }
    }

    function closePicker() { $('picker').classList.remove('open'); }

    async function confirmSend(sessionId) {
      closePicker();
      const text = currentLineText();
      if (!text) return;
      setStatus(`发送到 ${sessionId}…`);
      try {
        const r = await fetch(`/api/directories/${encodeURIComponent(_dirId)}/memo/send${tokenQS('?')}`, {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ text, sessionId }),
        });
        if (!r.ok) { const e = await r.json().catch(() => ({})); setStatus('发送失败：' + (e.error || r.status)); return; }
        setStatus(`已发送到 ${sessionId} · ${new Date().toLocaleTimeString()}`);
      } catch (e) { setStatus('发送失败：' + e.message); }
    }

    $('save-btn').onclick = saveMemo;
    $('send-btn').onclick = openPicker;
    $('picker-cancel').onclick = closePicker;
    $('memo-text').addEventListener('keydown', (e) => {
      if ((e.metaKey || e.ctrlKey) && e.key.toLowerCase() === 's') {
        e.preventDefault();
        saveMemo();
      }
    });

    bootstrap();
  </script>
</body>
</html>
