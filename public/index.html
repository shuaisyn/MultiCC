<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="theme-color" content="#161b22" />
  <link rel="manifest" href="/manifest.json" />
  <link rel="icon" href="/icon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="/icon.svg" />
  <title>MultiCC — Claude Code in Browser</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@5.3.0/css/xterm.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { height: 100%; }

    body {
      background: #0d1117;
      color: #c9d1d9;
      font-family: 'Segoe UI', system-ui, sans-serif;
      height: 100%;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      /* iOS safe area */
      padding-left:  env(safe-area-inset-left);
      padding-right: env(safe-area-inset-right);
    }

    /* ── Header ── */
    #header {
      flex-shrink: 0;
      background: #161b22;
      border-bottom: 1px solid #30363d;
      padding: 0 16px;
      height: 44px;
      display: flex;
      align-items: center;
      gap: 12px;
      user-select: none;
    }

    #header .logo {
      font-size: 15px;
      font-weight: 700;
      color: #f78166;
      letter-spacing: 0.5px;
    }

    #header .logo span { color: #79c0ff; }

    #status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #6e7681;
      transition: background 0.3s;
    }
    #status-dot.connected    { background: #3fb950; box-shadow: 0 0 6px #3fb95088; }
    #status-dot.connecting   { background: #d29922; animation: pulse 1s infinite; }
    #status-dot.disconnected { background: #f85149; }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.4; }
    }

    #status-label {
      font-size: 12px;
      color: #8b949e;
    }

    #session-label {
      font-size: 11px;
      color: #58a6ff;
      font-family: monospace;
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 4px;
      padding: 2px 7px;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
      white-space: nowrap;
    }
    #session-label:hover {
      background: #21262d;
      border-color: #58a6ff;
    }

    #reconnect-btn {
      padding: 5px 14px;
      background: #21262d;
      color: #c9d1d9;
      border: 1px solid #30363d;
      border-radius: 6px;
      cursor: pointer;
      font-size: 12px;
      display: none;
      transition: background 0.15s;
    }
    #reconnect-btn:hover { background: #30363d; }

    #header-actions {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-left: auto;
    }

    .hdr-btn {
      padding: 5px 10px;
      background: #21262d;
      color: #c9d1d9;
      border: 1px solid #30363d;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
      text-decoration: none;
      transition: background 0.15s, border-color 0.15s;
    }
    .hdr-btn:hover { background: #30363d; }

    /* ── Input Toolbar ── */
    #input-toolbar {
      flex-shrink: 0;
      background: #161b22;
      border-bottom: 1px solid #30363d;
      padding: 6px 12px;
      display: flex;
      align-items: center;
      gap: 8px;
      min-height: 42px;
    }

    .toolbar-btn {
      width: 30px;
      height: 30px;
      border-radius: 6px;
      border: 1px solid #30363d;
      background: #21262d;
      color: #c9d1d9;
      cursor: pointer;
      font-size: 15px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background 0.15s, border-color 0.15s;
    }
    .toolbar-btn:hover { background: #30363d; border-color: #58a6ff; }
    .toolbar-btn:disabled { opacity: 0.4; cursor: default; }
    .toolbar-btn.active {
      background: #f85149;
      border-color: #f85149;
      color: #fff;
      animation: pulse 1s infinite;
    }
    .toolbar-btn.processing {
      background: #d29922;
      border-color: #d29922;
      color: #fff;
      animation: pulse 1s infinite;
    }

    #mic-status {
      font-size: 11px;
      color: #8b949e;
      white-space: nowrap;
    }

    #attachments {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      flex: 1;
      align-items: center;
    }

    .attach-chip {
      display: flex;
      align-items: center;
      gap: 5px;
      background: #21262d;
      border: 1px solid #30363d;
      border-radius: 6px;
      padding: 3px 6px 3px 4px;
      cursor: pointer;
      transition: border-color 0.15s;
      max-width: 180px;
    }
    .attach-chip:hover { border-color: #58a6ff; }
    .attach-chip.pending { opacity: 0.6; cursor: wait; }

    .attach-chip img {
      width: 22px;
      height: 22px;
      object-fit: cover;
      border-radius: 3px;
      flex-shrink: 0;
    }

    .chip-name {
      font-size: 11px;
      color: #8b949e;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      flex: 1;
      min-width: 0;
    }

    .chip-remove {
      font-size: 14px;
      line-height: 1;
      color: #6e7681;
      flex-shrink: 0;
      transition: color 0.15s;
    }
    .chip-remove:hover { color: #f85149; }

    /* ── Notification Toast ── */
    #notify-toast {
      display: none;
      position: absolute;
      top: 8px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 9000;
      background: #1f6feb;
      color: #fff;
      font-size: 13px;
      font-weight: 600;
      padding: 8px 36px 8px 14px;
      border-radius: 8px;
      box-shadow: 0 4px 16px #00000066;
      cursor: pointer;
      animation: toastSlide 0.3s ease;
      white-space: nowrap;
      max-width: 90%;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    #notify-toast.waiting { background: #d29922; }
    #notify-toast.completed { background: #238636; }
    #notify-toast .toast-close {
      position: absolute;
      right: 10px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 16px;
      opacity: 0.7;
      transition: opacity 0.15s;
    }
    #notify-toast .toast-close:hover { opacity: 1; }
    @keyframes toastSlide {
      from { opacity: 0; transform: translateX(-50%) translateY(-20px); }
      to   { opacity: 1; transform: translateX(-50%) translateY(0); }
    }

    /* ── Terminal ── */
    #terminal-wrap {
      flex: 1;
      min-height: 0;
      padding: 6px 8px 8px;
      position: relative;
    }

    #terminal {
      width: 100%;
      height: 100%;
    }

    /* make xterm fill the container */
    .xterm { height: 100%; }
    .xterm-viewport { overflow-y: auto; }

    /* ── Mobile Input Bar ── */
    #mobile-bar {
      display: none; /* shown via media query */
      flex-shrink: 0;
      flex-direction: column;
      gap: 0;
      background: #161b22;
      border-top: 1px solid #30363d;
      padding-bottom: env(safe-area-inset-bottom);
    }

    #mobile-keys {
      display: flex;
      gap: 4px;
      padding: 6px 8px 4px;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
    }
    #mobile-keys::-webkit-scrollbar { display: none; }

    .mkey {
      flex-shrink: 0;
      min-width: 44px;
      height: 34px;
      padding: 0 10px;
      background: #21262d;
      border: 1px solid #30363d;
      border-radius: 6px;
      color: #c9d1d9;
      font-size: 12px;
      font-family: monospace;
      cursor: pointer;
      white-space: nowrap;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }
    .mkey:active { background: #388bfd; border-color: #388bfd; color: #fff; }

    #mobile-input-row {
      display: flex;
      gap: 6px;
      padding: 4px 8px 8px;
      align-items: center;
    }

    #mobile-input {
      flex: 1;
      height: 40px;
      background: #0d1117;
      border: 1px solid #30363d;
      border-radius: 8px;
      color: #c9d1d9;
      font-size: 14px;
      padding: 0 12px;
      outline: none;
      /* disable autocorrect noise */
      autocomplete: off;
    }
    #mobile-input:focus { border-color: #388bfd; }

    #mobile-send {
      flex-shrink: 0;
      height: 40px;
      padding: 0 16px;
      background: #238636;
      border: none;
      border-radius: 8px;
      color: #fff;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
    }
    #mobile-send:active { background: #2ea043; }

    /* ── File Browser Panel ── */
    #files-panel {
      display: none;
      position: fixed;
      top: 0; right: 0; bottom: 0;
      width: 300px;
      background: #161b22;
      border-left: 1px solid #30363d;
      z-index: 5000;
      flex-direction: column;
      box-shadow: -8px 0 32px #00000066;
    }
    #files-panel.open { display: flex; }

    #files-panel-header {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 0 12px;
      height: 44px;
      border-bottom: 1px solid #30363d;
      background: #0d1117;
    }
    #files-panel-header .fp-title {
      font-size: 13px;
      font-weight: 600;
      color: #f0f6fc;
      flex: 1;
    }
    .fp-btn {
      width: 26px;
      height: 26px;
      border: 1px solid #30363d;
      background: #21262d;
      color: #8b949e;
      border-radius: 5px;
      cursor: pointer;
      font-size: 13px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s, color 0.15s;
    }
    .fp-btn:hover { background: #30363d; color: #c9d1d9; }

    #files-panel-path {
      flex-shrink: 0;
      padding: 6px 12px;
      font-family: monospace;
      font-size: 11px;
      color: #58a6ff;
      border-bottom: 1px solid #30363d;
      word-break: break-all;
      background: #0d1117;
      line-height: 1.5;
    }

    #files-list {
      flex: 1;
      overflow-y: auto;
      padding: 4px 0;
    }
    #files-list::-webkit-scrollbar { width: 5px; }
    #files-list::-webkit-scrollbar-track { background: transparent; }
    #files-list::-webkit-scrollbar-thumb { background: #30363d; border-radius: 3px; }

    .file-item {
      display: flex;
      align-items: center;
      padding: 5px 12px;
      gap: 8px;
      cursor: default;
      transition: background 0.1s;
      min-height: 34px;
    }
    .file-item:hover { background: #21262d; }

    .file-item .fi-icon { flex-shrink: 0; font-size: 14px; width: 18px; text-align: center; }

    .file-item .fi-name {
      flex: 1;
      font-size: 12px;
      color: #c9d1d9;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      min-width: 0;
    }
    .file-item.is-dir .fi-name { color: #79c0ff; cursor: pointer; }
    .file-item.is-dir .fi-name:hover { text-decoration: underline; }
    .file-item.is-up .fi-name { color: #8b949e; cursor: pointer; }
    .file-item.is-up .fi-name:hover { color: #c9d1d9; text-decoration: underline; }

    .file-item .fi-size {
      font-size: 10px;
      color: #6e7681;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .file-item .fi-actions {
      display: flex;
      gap: 4px;
      flex-shrink: 0;
    }
    .fi-action-btn {
      width: 22px;
      height: 22px;
      border: 1px solid #30363d;
      background: transparent;
      color: #6e7681;
      border-radius: 4px;
      cursor: pointer;
      font-size: 11px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.1s, color 0.1s, border-color 0.1s;
      text-decoration: none;
    }
    .fi-action-btn:hover { background: #30363d; color: #c9d1d9; border-color: #58a6ff; }

    #files-error {
      padding: 12px;
      font-size: 12px;
      color: #f85149;
      display: none;
    }

    /* ── Voice Panel ── */
    #voice-panel {
      display: none;
      position: fixed;
      inset: 0;
      background: #00000088;
      z-index: 20000;
      align-items: center;
      justify-content: center;
    }
    #voice-panel.open { display: flex; }

    #voice-panel-inner {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 12px;
      padding: 20px;
      width: 560px;
      max-width: 96vw;
      box-shadow: 0 16px 48px #00000099;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .vp-header {
      font-size: 14px;
      font-weight: 600;
      color: #f0f6fc;
    }

    .vp-section-label {
      font-size: 11px;
      color: #8b949e;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    #voice-panel textarea {
      width: 100%;
      background: #0d1117;
      border: 1px solid #30363d;
      border-radius: 6px;
      color: #c9d1d9;
      font-size: 13px;
      font-family: 'Segoe UI', system-ui, sans-serif;
      padding: 8px 10px;
      resize: vertical;
      outline: none;
      min-height: 68px;
      line-height: 1.5;
    }
    #voice-panel textarea:focus { border-color: #388bfd; }

    #vp-status {
      font-size: 10px;
      color: #3fb950;
    }

    .vp-actions {
      display: flex;
      gap: 8px;
      justify-content: flex-end;
      flex-wrap: wrap;
    }

    .vp-actions button {
      padding: 7px 16px;
      border-radius: 6px;
      border: 1px solid #30363d;
      background: #21262d;
      color: #c9d1d9;
      font-size: 13px;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
    }
    .vp-actions button:hover { background: #30363d; }
    .vp-actions button.primary {
      background: #238636;
      border-color: #2ea043;
      color: #fff;
      font-weight: 600;
    }
    .vp-actions button.primary:hover { background: #2ea043; }
    .vp-timing {
      font-size: 12px;
      color: #8b949e;
      padding: 4px 0;
      min-height: 18px;
    }

    /* ── Mobile overrides ── */
    @media (max-width: 768px) {
      #mobile-bar { display: flex; }

      /* Terminal height set via JS (1/3 of initial screen px) — see client.js fixMobileLayout */
      #terminal-wrap {
        flex: none;
        /* height set by JS */
      }

      /* larger touch targets for toolbar */
      .toolbar-btn {
        width: 44px;
        height: 44px;
        font-size: 18px;
      }
      #input-toolbar {
        padding: 6px 10px;
        min-height: 56px;
      }
      #header {
        height: auto;
        padding: 6px 12px;
        flex-wrap: wrap;
        gap: 8px;
      }
      #header-actions {
        margin-left: 0;
        width: 100%;
        justify-content: flex-end;
      }
      #reconnect-btn {
        padding: 6px 12px;
        font-size: 13px;
      }
      /* terminal padding tighter */
      #terminal-wrap { padding: 4px 4px 4px; }
    }
  </style>
</head>
<body>
  <div id="header">
    <span class="logo">Multi<span>CC</span></span>
    <div id="status-dot" class="connecting"></div>
    <span id="status-label">Connecting…</span>
    <span id="session-label"></span>
    <div id="header-actions">
      <button id="save-cwd-btn" class="hdr-btn" title="更改工作目录" style="display:none">📂</button>
      <button id="files-btn" class="hdr-btn" title="文件浏览器">📁</button>
      <button id="notify-btn" class="hdr-btn" title="语音通知 (点击开启/关闭)">🔔</button>
      <a href="/wechat" class="hdr-btn" title="WeChat Bridge">💬</a>
      <button id="memo-btn" class="hdr-btn" title="项目备忘 (multicc.memo.md)" onclick="openMemo()">📝</button>
      <button id="merge-btn" class="hdr-btn" title="把此会话 worktree 合并回基分支">🔀</button>
      <button id="restart-btn" class="hdr-btn" title="重启 Claude 命令">🔄</button>
      <button id="reconnect-btn" onclick="connect()">Reconnect</button>
    </div>
  </div>

  <div id="input-toolbar">
    <button id="mic-btn" class="toolbar-btn" title="语音输入 (点击开始/停止)">🎤</button>
    <span id="mic-status"></span>
    <button id="attach-btn" class="toolbar-btn" title="附加文件">📎</button>
    <input id="file-input" type="file" style="display:none">
    <div id="attachments"></div>
  </div>

  <div id="terminal-wrap">
    <div id="notify-toast"><span class="toast-close">✕</span></div>
    <div id="terminal"></div>
  </div>

  <!-- Mobile input bar (visible on small screens) -->
  <div id="mobile-bar">
    <div id="mobile-keys">
      <button class="mkey" data-seq="&#x1b;">Esc</button>
      <button class="mkey" data-seq="&#x09;">Tab</button>
      <button class="mkey" data-seq="&#x15;">^U</button>
      <button class="mkey" data-seq="&#x03;">^C</button>
      <button class="mkey" data-seq="&#x04;">^D</button>
      <button class="mkey" data-seq="&#x1b;[A">↑</button>
      <button class="mkey" data-seq="&#x1b;[B">↓</button>
      <button class="mkey" data-seq="&#x1b;[D">←</button>
      <button class="mkey" data-seq="&#x1b;[C">→</button>
      <button class="mkey" data-seq="&#x1b;[H">Home</button>
      <button class="mkey" data-seq="&#x1b;[F">End</button>
    </div>
    <div id="mobile-input-row">
      <input id="mobile-input" type="text"
        placeholder="输入命令，回车发送…"
        autocomplete="off" autocorrect="off"
        autocapitalize="off" spellcheck="false" />
      <button id="mobile-send">发送</button>
    </div>
  </div>

  <!-- Initial directory picker modal (shown for new sessions) -->
  <div id="init-cwd-modal" style="display:none; position:fixed; inset:0; background:#000000cc; z-index:15000; align-items:center; justify-content:center;">
    <div style="background:#161b22; border:1px solid #30363d; border-radius:12px; padding:24px; width:540px; max-width:92vw; box-shadow:0 16px 48px #00000099;">
      <div style="font-size:16px; font-weight:700; color:#f0f6fc; margin-bottom:6px;">选择工作目录</div>
      <div style="font-size:12px; color:#8b949e; margin-bottom:16px;">Claude Code 将在此目录中启动，请选择项目所在的目录</div>
      <div style="font-size:12px; color:#8b949e; margin-bottom:6px;">目录路径</div>
      <input id="init-cwd-input" type="text"
        style="width:100%; background:#0d1117; border:1px solid #30363d; border-radius:6px; color:#c9d1d9; font-size:13px; font-family:monospace; padding:8px 12px; outline:none; margin-bottom:8px; box-sizing:border-box;"
        placeholder="输入目录路径，支持 ~ 和绝对路径…"
        autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" />
      <div id="init-cwd-browser" style="max-height:240px; overflow-y:auto; border:1px solid #21262d; border-radius:6px; background:#0d1117; margin-bottom:12px;"></div>
      <div style="font-size:12px; color:#8b949e; margin-bottom:6px;">Session ID（留空自动生成）</div>
      <input id="init-session-id" type="text"
        style="width:100%; background:#0d1117; border:1px solid #30363d; border-radius:6px; color:#c9d1d9; font-size:13px; font-family:monospace; padding:8px 12px; outline:none; margin-bottom:12px; box-sizing:border-box;"
        placeholder="例如 my-project、gps-edm…"
        autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" />
      <div id="init-cwd-error" style="font-size:12px; color:#f85149; margin-bottom:12px; display:none;"></div>
      <div style="display:flex; justify-content:flex-end; gap:10px;">
        <button id="init-cwd-skip" style="padding:7px 16px; border-radius:6px; border:1px solid #30363d; background:#21262d; color:#c9d1d9; font-size:13px; cursor:pointer;">使用默认 (Home)</button>
        <button id="init-cwd-confirm" style="padding:7px 16px; border-radius:6px; border:1px solid #2ea043; background:#238636; color:#fff; font-size:13px; font-weight:600; cursor:pointer;">启动</button>
      </div>
    </div>
  </div>

  <!-- Relocate directory modal -->
  <div id="relocate-modal" style="display:none; position:fixed; inset:0; background:#00000099; z-index:10000; align-items:center; justify-content:center;">
    <div style="background:#161b22; border:1px solid #30363d; border-radius:12px; padding:24px; width:500px; max-width:92vw; box-shadow:0 16px 48px #00000099;">
      <div style="font-size:15px; font-weight:600; color:#f0f6fc; margin-bottom:16px;">更改工作目录</div>
      <div style="font-size:12px; color:#8b949e; margin-bottom:4px;">当前目录</div>
      <div id="relocate-current" style="font-family:monospace; font-size:12px; color:#58a6ff; margin-bottom:16px; word-break:break-all; padding:6px 10px; background:#0d1117; border-radius:6px; border:1px solid #21262d;"></div>
      <div style="font-size:12px; color:#8b949e; margin-bottom:6px;">新目录路径</div>
      <input id="relocate-input" type="text"
        style="width:100%; background:#0d1117; border:1px solid #30363d; border-radius:6px; color:#c9d1d9; font-size:13px; font-family:monospace; padding:8px 12px; outline:none; margin-bottom:16px; box-sizing:border-box;"
        placeholder="输入目录路径，支持 ~ 和相对路径…"
        autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" />
      <div id="relocate-error" style="font-size:12px; color:#f85149; margin-bottom:12px; display:none;"></div>
      <div style="display:flex; justify-content:flex-end; gap:10px;">
        <button id="relocate-cancel" style="padding:7px 16px; border-radius:6px; border:1px solid #30363d; background:#21262d; color:#c9d1d9; font-size:13px; cursor:pointer;">取消</button>
        <button id="relocate-confirm" style="padding:7px 16px; border-radius:6px; border:1px solid #2ea043; background:#238636; color:#fff; font-size:13px; font-weight:600; cursor:pointer;">切换目录</button>
      </div>
    </div>
  </div>

  <!-- File Browser Panel -->
  <div id="files-panel">
    <div id="files-panel-header">
      <span class="fp-title">📁 文件浏览器</span>
      <button class="fp-btn" id="files-refresh-btn" title="刷新">↺</button>
      <button class="fp-btn" id="files-close-btn" title="关闭">✕</button>
    </div>
    <div id="files-panel-path">—</div>
    <div id="files-error"></div>
    <div id="files-list"></div>
  </div>

  <!-- Voice Processing Panel -->
  <div id="voice-panel">
    <div id="voice-panel-inner">
      <div class="vp-header">🎤 语音处理</div>
      <div class="vp-section-label">原始识别</div>
      <textarea id="vp-raw"></textarea>
      <div class="vp-section-label">AI 专业重排 <span id="vp-status"></span></div>
      <textarea id="vp-refined" placeholder="AI 处理中…"></textarea>
      <div id="vp-timing" class="vp-timing"></div>
      <div class="vp-actions">
        <button id="vp-cancel">取消</button>
        <button id="vp-use-raw" class="primary">使用原文</button>
        <button id="vp-use-refined">AI 重排</button>
      </div>
    </div>
  </div>

  <!-- Memo popup -->
  <div id="memo-modal" style="display:none; position:fixed; inset:0; background:#000000cc; z-index:15000; align-items:center; justify-content:center;">
    <div style="background:#161b22; border:1px solid #30363d; border-radius:12px; width:min(96vw, 1200px); max-height:95vh; display:flex; flex-direction:column; overflow:hidden; box-shadow:0 16px 48px #00000099;">
      <div style="display:flex;align-items:center;gap:8px;padding:10px 14px;border-bottom:1px solid #30363d;flex-shrink:0;">
        <div style="flex:1;min-width:0;">
          <div id="memo-title" style="font-size:14px;font-weight:600;color:#f0f6fc;">📝 备忘</div>
          <div id="memo-subtitle" style="font-size:11px;color:#8b949e;font-family:monospace;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;"></div>
        </div>
        <button class="hdr-btn" id="memo-send-btn" title="把光标所在行发到该目录的某个 chat 会话">→ 发送当前行</button>
        <button class="hdr-btn" id="memo-save-btn" title="保存 (Ctrl/Cmd+S)" style="background:#238636;border-color:#2ea043;color:#fff;">保存</button>
        <button class="hdr-btn" id="memo-close-btn">关闭</button>
      </div>
      <textarea id="memo-text" spellcheck="false" style="flex:1;width:100%;background:#0d1117;color:#c9d1d9;border:0;outline:0;padding:12px 16px;font-family:monospace;font-size:14px;line-height:1.6;resize:none;" placeholder="在这里写备忘…&#10;例：&#10;# todo&#10;- [ ] 任务一&#10;- [ ] 任务二"></textarea>
      <div id="memo-status" style="padding:6px 12px;font-size:11px;color:#6e7681;border-top:1px solid #21262d;font-family:monospace;"></div>
      <!-- Send-picker mini-modal -->
      <div id="memo-picker" style="display:none;position:absolute;inset:0;background:#00000066;align-items:center;justify-content:center;border-radius:12px;">
        <div style="background:#161b22;border:1px solid #30363d;border-radius:10px;padding:14px 18px;width:min(90%, 440px);">
          <h3 style="font-size:13px;color:#f0f6fc;margin-bottom:6px;">发送到 chat 会话</h3>
          <div id="memo-picker-preview" style="color:#8b949e;font-size:11px;margin-bottom:10px;font-family:monospace;word-break:break-word;background:#0d1117;border:1px solid #21262d;border-radius:6px;padding:6px 8px;max-height:90px;overflow:auto;"></div>
          <div id="memo-picker-list" style="display:flex;flex-direction:column;gap:6px;margin-bottom:10px;max-height:280px;overflow:auto;"></div>
          <div style="text-align:right;"><button class="hdr-btn" onclick="memoPickerClose()">取消</button></div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/xterm@5.3.0/lib/xterm.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xterm-addon-fit@0.8.0/lib/xterm-addon-fit.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xterm-addon-web-links@0.9.0/lib/xterm-addon-web-links.js"></script>
  <script src="pwa.js"></script>
  <script src="voice-stream.js"></script>
  <script src="client.js"></script>
</body>
</html>
