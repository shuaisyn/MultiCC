<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>WebCC — Claude Code in Browser</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@5.3.0/css/xterm.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0d1117;
      color: #c9d1d9;
      font-family: 'Segoe UI', system-ui, sans-serif;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      /* iOS safe area */
      padding-left:  env(safe-area-inset-left);
      padding-right: env(safe-area-inset-right);
    }

    /* ── Header ── */
    #header {
      flex-shrink: 0;
      background: #161b22;
      border-bottom: 1px solid #30363d;
      padding: 0 16px;
      height: 44px;
      display: flex;
      align-items: center;
      gap: 12px;
      user-select: none;
    }

    #header .logo {
      font-size: 15px;
      font-weight: 700;
      color: #f78166;
      letter-spacing: 0.5px;
    }

    #header .logo span { color: #79c0ff; }

    #status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #6e7681;
      transition: background 0.3s;
    }
    #status-dot.connected    { background: #3fb950; box-shadow: 0 0 6px #3fb95088; }
    #status-dot.connecting   { background: #d29922; animation: pulse 1s infinite; }
    #status-dot.disconnected { background: #f85149; }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.4; }
    }

    #status-label {
      font-size: 12px;
      color: #8b949e;
    }

    #session-label {
      font-size: 11px;
      color: #58a6ff;
      font-family: monospace;
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 4px;
      padding: 2px 7px;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
      white-space: nowrap;
    }
    #session-label:hover {
      background: #21262d;
      border-color: #58a6ff;
    }

    #reconnect-btn {
      margin-left: auto;
      padding: 5px 14px;
      background: #21262d;
      color: #c9d1d9;
      border: 1px solid #30363d;
      border-radius: 6px;
      cursor: pointer;
      font-size: 12px;
      display: none;
      transition: background 0.15s;
    }
    #reconnect-btn:hover { background: #30363d; }

    /* ── Input Toolbar ── */
    #input-toolbar {
      flex-shrink: 0;
      background: #161b22;
      border-bottom: 1px solid #30363d;
      padding: 6px 12px;
      display: flex;
      align-items: center;
      gap: 8px;
      min-height: 42px;
    }

    .toolbar-btn {
      width: 30px;
      height: 30px;
      border-radius: 6px;
      border: 1px solid #30363d;
      background: #21262d;
      color: #c9d1d9;
      cursor: pointer;
      font-size: 15px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background 0.15s, border-color 0.15s;
    }
    .toolbar-btn:hover { background: #30363d; border-color: #58a6ff; }
    .toolbar-btn:disabled { opacity: 0.4; cursor: default; }
    .toolbar-btn.active {
      background: #f85149;
      border-color: #f85149;
      color: #fff;
      animation: pulse 1s infinite;
    }

    #mic-status {
      font-size: 11px;
      color: #8b949e;
      white-space: nowrap;
    }

    #attachments {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      flex: 1;
      align-items: center;
    }

    .attach-chip {
      display: flex;
      align-items: center;
      gap: 5px;
      background: #21262d;
      border: 1px solid #30363d;
      border-radius: 6px;
      padding: 3px 6px 3px 4px;
      cursor: pointer;
      transition: border-color 0.15s;
      max-width: 180px;
    }
    .attach-chip:hover { border-color: #58a6ff; }
    .attach-chip.pending { opacity: 0.6; cursor: wait; }

    .attach-chip img {
      width: 22px;
      height: 22px;
      object-fit: cover;
      border-radius: 3px;
      flex-shrink: 0;
    }

    .chip-name {
      font-size: 11px;
      color: #8b949e;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      flex: 1;
      min-width: 0;
    }

    .chip-remove {
      font-size: 14px;
      line-height: 1;
      color: #6e7681;
      flex-shrink: 0;
      transition: color 0.15s;
    }
    .chip-remove:hover { color: #f85149; }

    /* ── Terminal ── */
    #terminal-wrap {
      flex: 1;
      min-height: 0;
      padding: 6px 8px 8px;
    }

    #terminal {
      width: 100%;
      height: 100%;
    }

    /* make xterm fill the container */
    .xterm { height: 100%; }
    .xterm-viewport { overflow-y: auto; }

    /* ── Mobile Input Bar ── */
    #mobile-bar {
      display: none; /* shown via media query */
      flex-shrink: 0;
      flex-direction: column;
      gap: 0;
      background: #161b22;
      border-top: 1px solid #30363d;
      padding-bottom: env(safe-area-inset-bottom);
    }

    #mobile-keys {
      display: flex;
      gap: 4px;
      padding: 6px 8px 4px;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
    }
    #mobile-keys::-webkit-scrollbar { display: none; }

    .mkey {
      flex-shrink: 0;
      min-width: 44px;
      height: 34px;
      padding: 0 10px;
      background: #21262d;
      border: 1px solid #30363d;
      border-radius: 6px;
      color: #c9d1d9;
      font-size: 12px;
      font-family: monospace;
      cursor: pointer;
      white-space: nowrap;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }
    .mkey:active { background: #388bfd; border-color: #388bfd; color: #fff; }

    #mobile-input-row {
      display: flex;
      gap: 6px;
      padding: 4px 8px 8px;
      align-items: center;
    }

    #mobile-input {
      flex: 1;
      height: 40px;
      background: #0d1117;
      border: 1px solid #30363d;
      border-radius: 8px;
      color: #c9d1d9;
      font-size: 14px;
      padding: 0 12px;
      outline: none;
      /* disable autocorrect noise */
      autocomplete: off;
    }
    #mobile-input:focus { border-color: #388bfd; }

    #mobile-send {
      flex-shrink: 0;
      height: 40px;
      padding: 0 16px;
      background: #238636;
      border: none;
      border-radius: 8px;
      color: #fff;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
    }
    #mobile-send:active { background: #2ea043; }

    /* ── Mobile overrides ── */
    @media (max-width: 768px) {
      #mobile-bar { display: flex; }

      /* larger touch targets for toolbar */
      .toolbar-btn {
        width: 44px;
        height: 44px;
        font-size: 18px;
      }
      #input-toolbar {
        padding: 6px 10px;
        min-height: 56px;
      }
      #header {
        height: 48px;
        padding: 0 12px;
      }
      #reconnect-btn {
        padding: 6px 12px;
        font-size: 13px;
      }
      /* terminal padding tighter */
      #terminal-wrap { padding: 4px 4px 4px; }
    }
  </style>
</head>
<body>
  <div id="header">
    <span class="logo">Web<span>CC</span></span>
    <div id="status-dot" class="connecting"></div>
    <span id="status-label">Connecting…</span>
    <span id="session-label"></span>
    <button id="reconnect-btn" onclick="connect()">Reconnect</button>
  </div>

  <div id="input-toolbar">
    <button id="mic-btn" class="toolbar-btn" title="语音输入 (点击开始/停止)">🎤</button>
    <span id="mic-status"></span>
    <button id="attach-btn" class="toolbar-btn" title="附加图片">📎</button>
    <input id="file-input" type="file" accept="image/*" style="display:none">
    <div id="attachments"></div>
  </div>

  <div id="terminal-wrap">
    <div id="terminal"></div>
  </div>

  <!-- Mobile input bar (visible on small screens) -->
  <div id="mobile-bar">
    <div id="mobile-keys">
      <button class="mkey" data-seq="&#x1b;">Esc</button>
      <button class="mkey" data-seq="&#x09;">Tab</button>
      <button class="mkey" data-seq="&#x03;">^C</button>
      <button class="mkey" data-seq="&#x04;">^D</button>
      <button class="mkey" data-seq="&#x1b;[A">↑</button>
      <button class="mkey" data-seq="&#x1b;[B">↓</button>
      <button class="mkey" data-seq="&#x1b;[D">←</button>
      <button class="mkey" data-seq="&#x1b;[C">→</button>
      <button class="mkey" data-seq="&#x1b;[H">Home</button>
      <button class="mkey" data-seq="&#x1b;[F">End</button>
    </div>
    <div id="mobile-input-row">
      <input id="mobile-input" type="text"
        placeholder="输入命令，回车发送…"
        autocomplete="off" autocorrect="off"
        autocapitalize="off" spellcheck="false" />
      <button id="mobile-send">发送</button>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/xterm@5.3.0/lib/xterm.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xterm-addon-fit@0.8.0/lib/xterm-addon-fit.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xterm-addon-web-links@0.9.0/lib/xterm-addon-web-links.js"></script>
  <script src="client.js"></script>
</body>
</html>
