<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>WebCC</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #0d1117;
      --card-bg: #161b22;
      --border: #30363d;
      --text: #e6edf3;
      --text-muted: #8b949e;
      --accent: #58a6ff;
      --orange: #f78166;
      --green: #3fb950;
      --danger: #f85149;
    }

    html, body { height: 100%; background: var(--bg); color: var(--text); font-family: -apple-system, system-ui, sans-serif; }

    .container {
      display: flex; align-items: center; justify-content: center;
      height: 100%; padding: 20px; padding-top: env(safe-area-inset-top);
    }

    .inner { width: 100%; max-width: 400px; text-align: center; }

    .logo h1 { font-size: 48px; font-weight: 700; margin-bottom: 8px; }
    .logo .web { color: var(--orange); }
    .logo .cc { color: var(--accent); }
    .logo p { color: var(--text-muted); font-size: 14px; font-family: monospace; margin-bottom: 32px; }

    .form-group {
      background: var(--card-bg); border: 1px solid var(--border);
      border-radius: 12px; padding: 24px; margin-bottom: 16px;
    }
    .form-group label { display: block; text-align: left; font-size: 13px; color: var(--text-muted); margin-bottom: 8px; }

    input[type="url"] {
      width: 100%; background: var(--bg); border: 1px solid var(--border);
      border-radius: 8px; padding: 12px 14px; color: var(--text);
      font-size: 16px; font-family: monospace; outline: none;
    }
    input[type="url"]:focus { border-color: var(--accent); }
    input[type="url"]::placeholder { color: #484f58; }

    .btn-connect {
      width: 100%; margin-top: 14px; padding: 14px;
      background: var(--accent); color: #fff; border: none; border-radius: 8px;
      font-size: 16px; font-weight: 600; cursor: pointer;
    }
    .btn-connect:active { opacity: 0.8; }

    .status { margin-top: 12px; font-size: 13px; color: var(--text-muted); min-height: 20px; }
    .status.error { color: var(--danger); }

    .history { text-align: left; margin-top: 16px; }
    .history-title { font-size: 12px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }

    .history-item {
      display: flex; align-items: center;
      padding: 12px; background: var(--bg); border: 1px solid var(--border);
      border-radius: 8px; margin-bottom: 6px; cursor: pointer;
    }
    .history-item:active { border-color: var(--accent); }
    .history-item .url { font-family: monospace; font-size: 13px; color: var(--accent); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1; }
    .history-item .remove { color: var(--text-muted); font-size: 20px; padding: 0 8px; flex-shrink: 0; }
    .history-item .remove:active { color: var(--danger); }
  </style>
</head>
<body>
<div class="container">
  <div class="inner">
    <div class="logo">
      <h1><span class="web">Web</span><span class="cc">CC</span></h1>
      <p>$ claude --connect</p>
    </div>

    <div class="form-group">
      <label for="serverUrl">服务器地址</label>
      <input type="url" id="serverUrl" placeholder="https://192.168.1.x:3443"
             autocapitalize="none" autocorrect="off" spellcheck="false">
      <button class="btn-connect" id="connectBtn" onclick="doConnect()">连接</button>
      <div class="status" id="status"></div>
    </div>

    <div class="history" id="historySection" style="display:none">
      <div class="history-title">历史连接</div>
      <div id="historyList"></div>
    </div>
  </div>
</div>

<script>
const STORAGE_KEY = 'webcc_servers';
const LAST_KEY = 'webcc_last_url';

const $ = id => document.getElementById(id);

function getSavedServers() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]'); } catch { return []; }
}

function saveServer(url) {
  const servers = getSavedServers().filter(s => s !== url);
  servers.unshift(url);
  if (servers.length > 10) servers.pop();
  localStorage.setItem(STORAGE_KEY, JSON.stringify(servers));
  localStorage.setItem(LAST_KEY, url);
}

function removeServer(url, e) {
  e.stopPropagation();
  localStorage.setItem(STORAGE_KEY, JSON.stringify(getSavedServers().filter(s => s !== url)));
  if (localStorage.getItem(LAST_KEY) === url) localStorage.removeItem(LAST_KEY);
  renderHistory();
}

function renderHistory() {
  const servers = getSavedServers();
  const section = $('historySection');
  const list = $('historyList');
  if (!servers.length) { section.style.display = 'none'; return; }
  section.style.display = 'block';
  list.innerHTML = '';
  servers.forEach(url => {
    const item = document.createElement('div');
    item.className = 'history-item';
    item.innerHTML = `<span class="url">${url.replace(/^https?:\/\//, '')}</span><span class="remove">×</span>`;
    item.querySelector('.url').onclick = () => { $('serverUrl').value = url; doConnect(); };
    item.querySelector('.remove').onclick = (e) => removeServer(url, e);
    list.appendChild(item);
  });
}

function doConnect() {
  let url = $('serverUrl').value.trim();
  if (!url) { $('status').textContent = '请输入服务器地址'; $('status').className = 'status error'; return; }
  if (!/^https?:\/\//i.test(url)) url = 'https://' + url;
  url = url.replace(/\/+$/, '');
  saveServer(url);
  // Navigate directly — WebView handles SSL
  window.location.href = url + '/manage';
}

function init() {
  $('serverUrl').addEventListener('keydown', e => { if (e.key === 'Enter') doConnect(); });
  renderHistory();
  const lastUrl = localStorage.getItem(LAST_KEY);
  if (lastUrl) $('serverUrl').value = lastUrl;
}

init();
</script>
</body>
</html>
